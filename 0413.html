<html>
    <head>
        <title>0413-漸變、字形、陰影</title>
        <style>
            #d1{
                width:100px;
                height:50px;
                background: red;
                border: 3px solid pink;
                transition:border .5s,background .5s;
            }
            #d1:hover{
                border: 3px solid yellow;
                background:darkred;
            }

            #d2{
                width:200px;
                height:100px;
                background: red;
                box-shadow: black 0px 0px 0px 5px;
            }
            #d3{
                font-size: 30pt;
                color:white;
                text-shadow:black 0px 0px 10px;
            }
             #d4{
                font-family:'Times New Roman','標楷體', Times, serif;
                font-size: 31pt;
            }
             #d5{
                font-family: Arial, Helvetica, sans-serif;
                font-size: 31pt;
            }

        </style>
    </head>
    <body>
        <div id="d1"></div>
        <div id="d2"></div>
        <div id="d3">文字</div>
        <div id="d4">襯線體Times New Roman</div>
        <div id="d5">無襯線體Arial, Helvetica</div>
    </body>
</html>

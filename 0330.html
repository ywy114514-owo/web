<html>
<head>
    <title>0330-CSS容器大小及位置</title>
    <style>
        div{
            margin-bottom: 10px;
        }
        #d1{
            width: 0px;
            height: 0px;
            border: solid 50px black;
            border-color: red yellow blue green;
            border-width: 10px 20px 30px 40px;
        }
        #d2{
            width: 100px;
            height: 100px;
            border: solid 1px black;
            border-radius: 50px;
        }
        #d3{
            width:400px;
            height: 400px;
            border:solid 1px black;
            position: relative;
        }
        #d31{
            width:50px;
            height: 50px;
            border:solid 1px red;
            background-color:red;
            position: absolute;
            top:0px;
            left:0px;
            z-index: 30;
        }
        #d32{
            width:50px;
            height: 50px;
            border:solid 1px blue;
            background-color:blue ;
            position: absolute;
            top:10px;
            left:10px;
            z-index: 20;
        }
        #d4{
            width: 100px;
            height: 100px;
            background-color: green;
            transform:scale(2,0.5)translate(100px) rotate(15deg);
        }














        #t1{
            width: 0px;
            height: 0px;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-bottom: 50px solid green;
            margin-bottom: -10px;
            margin-left:18px;
        }
        #t2{
            width: 30px;
            height: 0px;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-bottom: 50px solid green;
            margin-bottom: -10px;
            margin-left:3px;
        }
        #t3{
            width: 50px;
            height: 0px;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-bottom: 50px solid green;
            margin-bottom: -10px;
            margin-left:-5px;
        }
        #t4{
            width:15px;
            height:50px;
            background-color: green;
            margin-left:35px;
        }
    </style>
</head>  
<body>
    <div id="d1"></div>
    <div id="d2"></div>
    <div id="d3">
        <div id="d31"></div>
        <div id="d32"></div>
    </div>
    <div id="d4"></div>



    <div id="t1"></div>
    <div id="t2"></div>
    <div id="t3"></div>
    <div id="t4"></div>
</body>  
</html>

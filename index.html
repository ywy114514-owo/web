        <h3>每週筆記</h3>
        <P>我的名字叫吉良吉影，今年33歲。
住在杜王町東北部的別墅區一帶，未婚。
我在龜友連鎖店服務。
每天都要加班到晚上8點才能回家。
我不抽煙，酒僅止於淺嚐。
晚上11點睡，每天要睡足8個小時。
睡前，我一定喝一杯溫牛奶，然後做20分鐘的柔軟操，上了床，馬上熟睡。
一覺到天亮，決不把疲勞和壓力留到第二天。醫生都說我很正常。</P>
